<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Documentación - Pokequiz</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #EE1515; /* Rojo Pokebola */
            --secondary: #37474F; /* Gris oscuro azulado oficial */
            --retro-bg: #ECEFF1; /* Fondo retro oficial */
            --white: #FFFFFF;
            --bg-page: #94A684; /* Verde pantalla GBA oficial */
            --blue: #3B4CCA;
            --border-thick: 4px;
            --border-thin: 2px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html, body {
            height: 100%;
            overflow: hidden;
            background-color: var(--bg-page);
        }

        .page-container {
            height: 100vh;
            overflow-y: scroll;
            scroll-snap-type: y mandatory;
            scroll-behavior: smooth;
        }

        section {
            height: 100vh;
            width: 100%;
            scroll-snap-align: start;
            position: relative;
        }

        /* ESTILO POKEBOLA (HERO) */
        .hero {
            display: flex;
            flex-direction: column;
            background: linear-gradient(180deg, var(--primary) 50%, var(--white) 50%);
            border-bottom: 8px solid var(--secondary);
        }

        .top-half {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding-bottom: 60px;
        }

        .bottom-half {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding-top: 60px;
            gap: 2rem;
        }

        .mid-line {
            position: absolute;
            top: 50%;
            left: 0;
            width: 100%;
            height: 20px;
            background-color: var(--secondary);
            transform: translateY(-50%);
            z-index: 5;
        }

        .pokeball-button {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 140px;
            height: 140px;
            background: var(--white);
            border: 15px solid var(--secondary);
            border-radius: 50%;
            z-index: 10;
            box-shadow: 0 8px 0px rgba(0,0,0,0.2);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .pokeball-button::after {
            content: '';
            width: 50px;
            height: 50px;
            border: 3px solid #ccc;
            border-radius: 50%;
            background: white;
        }

        h1 {
            font-family: 'Press Start 2P', cursive;
            font-size: clamp(2rem, 8vw, 4rem);
            color: white;
            text-shadow: 6px 6px 0px var(--secondary);
            text-align: center;
        }

        p.subtitle {
            font-family: 'Press Start 2P', cursive;
            font-size: clamp(0.8rem, 3vw, 1.5rem);
            line-height: 1.5;
            color: var(--secondary);
            text-transform: uppercase;
            text-align: center;
        }

        .scroll-arrow {
            width: 60px;
            height: 60px;
            background: var(--white);
            color: var(--secondary);
            border: 4px solid var(--secondary);
            display: flex;
            justify-content: center;
            align-items: center;
            text-decoration: none;
            font-size: 1.8rem;
            animation: bounce 2s infinite;
            transition: all 0.2s;
        }

        .scroll-arrow:hover {
            background: var(--secondary);
            color: white;
        }

        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% {transform: translateY(0);}
            40% {transform: translateY(-10px);}
            60% {transform: translateY(-5px);}
        }

        /* ESTILO MANUALES (CARDS) */
        .main-content {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            background-image: 
                radial-gradient(var(--secondary) 1px, transparent 1px);
            background-size: 20px 20px;
            background-color: var(--bg-page);
        }

        .container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
            gap: 3rem;
            max-width: 1100px;
            width: 100%;
        }

        /* Imitación de RetroMenuBox */
        .card {
            background-color: var(--retro-bg);
            border: var(--border-thick) solid var(--secondary);
            outline: var(--border-thin) solid white;
            outline-offset: calc(var(--border-thin) * -1 - var(--border-thick));
            padding: 3rem;
            text-align: center;
            text-decoration: none;
            color: inherit;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            box-shadow: 8px 8px 0px rgba(0,0,0,0.1);
        }

        /* Corner Dots de la app */
        .card::before, .card::after, .card .dot-tl, .card .dot-tr {
            content: '';
            position: absolute;
            width: 8px;
            height: 8px;
            background: var(--secondary);
        }
        .card::before { bottom: 0; left: 0; }
        .card::after { bottom: 0; right: 0; }
        .card .dot-tl { top: 0; left: 0; }
        .card .dot-tr { top: 0; right: 0; }

        .card:hover {
            transform: translate(-4px, -4px);
            box-shadow: 12px 12px 0px var(--secondary);
        }

        .icon-box {
            width: 100px;
            height: 100px;
            background: white;
            border: 3px solid var(--secondary);
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 2rem;
            font-size: 3rem;
        }

        .card h2 {
            font-family: 'Press Start 2P', cursive;
            font-size: 1.1rem;
            color: var(--secondary);
            margin-bottom: 1.5rem;
        }

        .card p {
            font-family: monospace;
            font-weight: bold;
            color: var(--secondary);
            font-size: 1rem;
            line-height: 1.6;
            margin-bottom: 2rem;
        }

        .btn {
            background: var(--secondary);
            color: white;
            padding: 1rem 2rem;
            border: none;
            font-family: 'Press Start 2P', cursive;
            font-size: 0.8rem;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: auto;
        }

        .card:hover .btn {
            background: var(--primary);
            box-shadow: 4px 4px 0px #880000;
        }

        footer {
            padding: 2rem;
            text-align: center;
            font-family: monospace;
            color: var(--secondary);
            font-weight: bold;
            background-color: var(--bg-page);
        }

        @media (max-width: 900px) {
            .container { grid-template-columns: 1fr; gap: 2rem; }
            .card { padding: 2rem 1.5rem; }
            h1 { font-size: 2rem; }
        }
    </style>
</head>
<body>

    <div class="page-container">
        
        <!-- PANTALLA 1 -->
        <section class="hero">
            <div class="mid-line"></div>
            <div class="pokeball-button"></div>

            <div class="top-half">
                <h1>POKEQUIZ</h1>
            </div>

            <div class="bottom-half">
                <p class="subtitle">CENTRO DE<br>DOCUMENTACIÓN</p>
                <a href="#manuales" class="scroll-arrow">↓</a>
            </div>
        </section>

        <!-- PANTALLA 2 -->
        <section class="main-content" id="manuales">
            <div class="container">
                <!-- Card de Implantación -->
                <a href="manuales/manual_implantacion.html" class="card">
                    <div class="dot-tl"></div><div class="dot-tr"></div>
                    <div class="icon-box">⚙️</div>
                    <h2>IMPLANTACIÓN</h2>
                    <p>GUÍA TÉCNICA PARA DESARROLLADORES. REQUISITOS, CONFIGURACIÓN Y DESPLIEGUE.</p>
                    <div class="btn">ABRIR</div>
                </a>

                <!-- Card de Usuario -->
                <a href="manuales/manual_usuario.html" class="card">
                    <div class="dot-tl"></div><div class="dot-tr"></div>
                    <div class="icon-box">🎒</div>
                    <h2>GUÍA USUARIO</h2>
                    <p>TODO LO QUE NECESITAS SABER PARA JUGAR, COMBATIR Y COMPLETAR TU COLECCIÓN.</p>
                    <div class="btn">ABRIR</div>
                </a>
            </div>
        </section>

        <footer>
            &copy; 2026 POKEQUIZ PROJECT | RETRO STYLE DOCUMENTATION
        </footer>

    </div>

</body>
</html>
